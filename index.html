<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Science Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .container {
            display: flex;
            max-width: 1000px;
            width: 100%;
        }
        .left {
            flex: 1;
            padding: 20px;
            text-align: center;
        }
        .left img {
            width: 150px;
            border-radius: 50%;
        }
        .left h1 {
            margin: 20px 0 10px;
        }
        .left .social-icons a {
            margin: 0 10px;
            color: #fff;
            text-decoration: none;
            font-size: 24px;
        }
        .right {
            flex: 2;
            padding: 20px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h2 {
            margin-bottom: 10px;
            border-bottom: 1px solid #fff;
            padding-bottom: 5px;
        }
        .typing {
            border-right: .15em solid #fff;
            white-space: nowrap;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="/assets/profile_icon.jpg" alt="Revati Pawar">
            <h1>Revati Pawar</h1>
            <div class="typing" id="typing-text"></div>
            <div class="social-icons">
                <a href="https://www.linkedin.com/in/yourprofile" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="https://github.com/yourprofile" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://twitter.com/yourprofile" target="_blank"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
        <div class="right">
            <div class="section">
                <h2>About Me</h2>
                <p>Brief description about yourself.</p>
            </div>
            <div class="section">
                <h2>Work Experience</h2>
                <p>Details about your work experience.</p>
            </div>
            <div class="section">
                <h2>Projects</h2>
                <p>Details about your projects.</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const texts = ["Data Scientist", "Machine Learning Enthusiast", "AI Researcher"];
            let count = 0;
            let index = 0;
            let currentText = '';
            let letter = '';
            (function type() {
                if (count === texts.length) {
                    count = 0;
                }
                currentText = texts[count];
                letter = currentText.slice(0, ++index);

                document.getElementById('typing-text').textContent = letter;
                if (letter.length === currentText.length) {
                    count++;
                    index = 0;
                    setTimeout(type, 2000); // Wait for 2 seconds before typing the next text
                } else {
                    setTimeout(type, 100); // Typing speed
                }
            }());
        });
    </script>
</body>
</html>
